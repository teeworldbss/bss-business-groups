    :root {

      --wa-header: linear-gradient(135deg, #075e54 0%, #128c7e 100%);
      --wa-bubble: #ffffff;
      --wa-user-bubble: #dcf8c6;
    }

    body { 
      font-family: 'Segoe UI', Helvetica, Arial, sans-serif; 
      margin: 0; background: var(--wa-bg); 
      display: flex; flex-direction: column; height: 100vh; 
      overflow: hidden;
    }

    header { 
      background: var(--wa-header); color: white; padding: 15px; 
      display: flex; align-items: center; gap: 12px; 
      box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 10;
    }

    #chat-window { 
      flex: 1; overflow-y: auto; padding: 15px; 
      display: flex; flex-direction: column; gap: 12px; 
    }

    .msg { 
      max-width: 85%; padding: 10px 14px; border-radius: 8px; 
      font-size: 0.95rem; box-shadow: 0 1px 2px rgba(0,0,0,0.15); 
      position: relative; line-height: 1.4;
    }

    .bot { background: var(--wa-bubble); align-self: flex-start; border-top-left-radius: 0; color: #303030; }
    .user { background: var(--wa-user-bubble); align-self: flex-end; border-top-right-radius: 0; color: #303030; }

    .menu-item { color: #075e54; font-weight: bold; }

    /* Input Pad */
    .input-pad { 
      background: #f0f0f0; padding: 12px; display: flex; gap: 10px; 
      align-items: center; border-top: 1px solid #ddd;
    }

    #user-input { 
      flex: 1; padding: 12px 18px; border-radius: 25px; 
      border: none; outline: none; font-size: 1rem; 
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.1);
    }

    #send-btn { 
      background: #075e54; color: white; border: none; 
      width: 48px; height: 48px; border-radius: 50%; 
      cursor: pointer; font-size: 1.2rem; display: flex; 
      align-items: center; justify-content: center;
    }
  </style>
</head>
